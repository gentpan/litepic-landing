name: Build & deploy litepic.io

# Builds the litepic.io marketing + docs site (Next.js static export)
# and rsyncs it to the OpenResty origin behind Cloudflare.

on:
  push:
    branches: [main]
  workflow_dispatch:
  # When the LitePic main repo cuts a release, that repo can dispatch
  # `litepic-released` here so the hero badge (which reads tag_name +
  # published_at from the GitHub releases API at build time) refreshes
  # immediately. Optional — we also have the daily safety net below.
  repository_dispatch:
    types: [litepic-released]
  # Belt-and-braces fallback: rebuild every day at 03:30 UTC even
  # without a triggering event, so a stale build never lingers more
  # than 24h if cross-repo dispatch fails.
  schedule:
    - cron: '30 3 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build static export
        run: npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LITEPIC_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.LITEPIC_DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to litepic.io
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            out/ \
            root@${{ secrets.LITEPIC_DEPLOY_HOST }}:${{ secrets.LITEPIC_DEPLOY_PATH }}/

      - name: Smoke test
        run: |
          sleep 3
          curl -fsS -o /dev/null -w "GET /          -> %{http_code}\n" https://litepic.io/
          curl -fsS -o /dev/null -w "GET /docs/     -> %{http_code}\n" https://litepic.io/docs/
          curl -fsS -o /dev/null -w "GET /changelog/-> %{http_code}\n" https://litepic.io/changelog/
